name: superagent-phase2

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superagent}
      POSTGRES_USER: ${POSTGRES_USER:-superagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superagent} -d ${POSTGRES_DB:-superagent}"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"
      - "127.0.0.1:${OTLP_HTTP_HOST_PORT:-4318}:4318"
    restart: unless-stopped

  backend:
    image: superagent-sentinel-backend:phase3-observability
    build:
      context: ./backend
    environment:
      APP_ENV: production
      PROJECT_ROOT: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-superagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-superagent}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:${FRONTEND_HOST_PORT:-8080},http://127.0.0.1:${FRONTEND_HOST_PORT:-8080}
      ANALYSIS_STAGE_DELAY_MS: "100"
      OTEL_TRACING_ENABLED: "true"
      OTEL_SERVICE_NAME: superagent-api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACE_SAMPLE_RATIO: "1.0"
    volumes:
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health')); assert d['status']=='ok' and d['version']=='0.3.0'"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 5s
    restart: unless-stopped

  worker:
    image: superagent-sentinel-backend:phase3-observability
    command: ["python", "-m", "app.worker"]
    environment:
      APP_ENV: production
      PROJECT_ROOT: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-superagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-superagent}
      REDIS_URL: redis://redis:6379/0
      ANALYSIS_STAGE_DELAY_MS: "100"
      OTEL_TRACING_ENABLED: "true"
      OTEL_SERVICE_NAME: superagent-worker
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACE_SAMPLE_RATIO: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: superagent-sentinel-frontend:phase3
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
