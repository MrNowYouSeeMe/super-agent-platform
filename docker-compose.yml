services:
  backend:
    build: ./backend
    environment:
      APP_ENV: production
      ANALYSIS_STAGE_DELAY_MS: "180"
      CORS_ORIGINS: http://localhost:8080
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped