sonar.projectKey=MrNowYouSeeMe_super-agent-platform
sonar.organization=mrnowyouseeme
sonar.projectName=SuperAgent Sentinel
sonar.sourceEncoding=UTF-8

sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=backend/tests/**/*.py,frontend/tests/**/*.ts,frontend/tests/**/*.tsx

sonar.exclusions=\
**/__pycache__/**,\
**/.pytest_cache/**,\
**/.venv/**,\
frontend/node_modules/**,\
frontend/dist/**,\
data/**,\
artifacts/**,\
_backup/**,\
_test-reports/**,\
**/*.csv

sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300